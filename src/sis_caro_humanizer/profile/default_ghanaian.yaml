  never_use:
    - delve
    - tapestry
    - leverage
    - navigate
    - multifaceted
    - intricate
    - holistic
    - paradigm
    - in conclusion
    - to summarize
    - it is worth noting
  preferred_swaps:
    delve: [examine, look at, go into]
    leverage: [use, draw on, rely on]
    navigate: [work through, deal with, get round]
    foster: [build, encourage, support]
    intricate: [complicated, layered]
    multifaceted: [many-sided, complex]
    ensure: [make sure, see to it that]
    holistic: [overall, whole-of-system]
    underscore: [highlight, point to]
    elucidate: [explain, make clear]
    illuminate: [explain, shed light on]
    streamline: [simplify, tidy up]
  repetition_tolerance: high

connectors_per_1000w:
  as such: 3.5
  however: 2.0
  and so: 1.2
  thus: 0.8

blupper_probabilities:
  comma_splice_rate: 0.15
  data_singular_verb: 0.70
  less_for_fewer: 0.20
  which_for_that: 0.30
  oxford_comma_rate: 0.55
  start_with_and_but: 0.08
  article_drop_ghanaian: 0.12
  tense_shift_past_present: 0.10

hedge_mix:
