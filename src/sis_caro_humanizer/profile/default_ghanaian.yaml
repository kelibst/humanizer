    - looks like
    - hard to say with certainty
    - one would think
    - it is not clear whether

paragraph_shape:
  topic_sentence_perfection_max: 0.40
  thinking_marker_rate: 0.15
  thinking_markers:
    - "Interestingly,"
    - "What stands out here is that"
    - "This raises an important question:"
    - "Looking at the data above,"
    - "From the table, it is clear that"
    - "Of course, this does not mean that"
  length_cv_min: 0.45

forbidden_openers:
  - "In conclusion"
  - "To summarize"
  - "It is worth noting"
  - "Furthermore,"
  - "Additionally,"
  - "Moreover,"

risk_target: 0.35
