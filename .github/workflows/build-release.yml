name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" pyinstaller

      - name: Build binary
        run: pyinstaller packaging/pyinstaller.spec --clean --noconfirm

      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          mv dist/humanize dist/humanize-linux-${ARCH}

      - name: Rename binary (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCH=$(uname -m)
          mv dist/humanize dist/humanize-macos-${ARCH}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
          if ($arch -eq "amd64") { $arch = "x86_64" }
          Move-Item dist/humanize.exe dist/humanize-windows-${arch}.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: humanize-linux
          path: dist/humanize-linux-*
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: humanize-macos
          path: dist/humanize-macos-*
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: humanize-windows
          path: dist/humanize-windows-*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "humanizer ${{ github.ref_name }}" \
            --generate-notes \
            dist/humanize-linux/humanize-linux-* \
            dist/humanize-macos/humanize-macos-* \
            dist/humanize-windows/humanize-windows-*.exe
